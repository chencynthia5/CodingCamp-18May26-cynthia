<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with Greeting -->
        <header class="greeting-section">
            <div class="greeting-content">
                <h1 id="greeting">Hello!</h1>
                <p id="currentTime">Loading...</p>
                <div class="name-input">
                    <label for="userName">Your Name:</label>
                    <input type="text" id="userName" placeholder="Enter your name" maxlength="20">
                </div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main class="dashboard-grid">
            <!-- Focus Timer -->
            <section class="timer-section">
                <h2>Focus Timer</h2>
                <div class="timer-display">
                    <span id="timerMinutes">25</span>:<span id="timerSeconds">00</span>
                </div>
                <div class="timer-controls">
                    <button id="startTimer" class="btn btn-primary">Start</button>
                    <button id="stopTimer" class="btn btn-secondary" disabled>Stop</button>
                    <button id="resetTimer" class="btn btn-secondary">Reset</button>
                </div>
                <div class="timer-settings">
                    <label for="timerDuration">Timer Duration (minutes):</label>
                    <input type="number" id="timerDuration" min="1" max="60" value="25">
                </div>
            </section>

            <!-- To-Do List -->
            <section class="todo-section">
                <h2>To-Do List</h2>
                <div class="todo-input">
                    <input type="text" id="newTask" placeholder="Add a new task...">
                    <button id="addTask" class="btn btn-primary">Add</button>
                </div>
                <ul id="taskList" class="task-list"></ul>
            </section>

            <!-- Quick Links -->
            <section class="links-section">
                <h2>Quick Links</h2>
                <div class="links-input">
                    <input type="text" id="newLinkName" placeholder="Link name...">
                    <input type="url" id="newLinkUrl" placeholder="https://example.com">
                    <button id="addLink" class="btn btn-primary">Add Link</button>
                </div>
                <ul id="linkList" class="link-list"></ul>
            </section>
        </main>

        <!-- Theme Toggle -->
        <footer class="theme-toggle">
            <button id="themeToggle" class="btn btn-secondary">🌙 Dark Mode</button>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
